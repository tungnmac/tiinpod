basePath: /api
definitions:
  handler.LoginRequest:
    properties:
      password:
        example: "123456"
        type: string
      username:
        example: admin
        type: string
    required:
    - password
    - username
    type: object
  handler.RegisterRequest:
    properties:
      email:
        example: new.user@example.com
        type: string
      password:
        example: password123
        type: string
      role:
        example: user
        type: string
      username:
        example: newuser
        type: string
    required:
    - email
    - password
    - username
    type: object
  model.Category:
    type: object
  model.Order:
    type: object
  model.Product:
    type: object
  model.ProductTemplate:
    type: object
host: localhost:8080
info:
  contact:
    email: support@tiinpod.com
    name: API Support
    url: http://www.tiinpod.com/support
  description: Đây là tài liệu API cho hệ thống thương mại điện tử TiinPod.
  license:
    name: Apache 2.0
    url: http://www.apache.org/licenses/LICENSE-2.0.html
  termsOfService: http://swagger.io/terms/
  title: TiinPod E-commerce API
  version: "1.0"
paths:
  /auth/login:
    post:
      consumes:
      - application/json
      description: Thực hiện đăng nhập bằng username và password để nhận access token
      parameters:
      - description: Thông tin đăng nhập
        in: body
        name: loginRequest
        required: true
        schema:
          $ref: '#/definitions/handler.LoginRequest'
      produces:
      - application/json
      responses:
        "200":
          description: Đăng nhập thành công và trả về access token
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu không hợp lệ
          schema:
            additionalProperties:
              type: string
            type: object
        "401":
          description: Sai tên đăng nhập hoặc mật khẩu
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Đăng nhập người dùng
      tags:
      - Auth
  /auth/register:
    post:
      consumes:
      - application/json
      description: Tạo tài khoản người dùng mới trong hệ thống
      parameters:
      - description: Thông tin đăng ký
        in: body
        name: registerRequest
        required: true
        schema:
          $ref: '#/definitions/handler.RegisterRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Đăng ký thành công
          schema:
            additionalProperties: true
            type: object
        "400":
          description: Dữ liệu hoặc Username đã tồn tại
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Đăng ký người dùng mới
      tags:
      - Auth
  /categories:
    get:
      description: Retrieve a list of all categories
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            items:
              $ref: '#/definitions/model.Category'
            type: array
        "500":
          description: Internal Server Error
          schema:
            additionalProperties:
              type: string
            type: object
      summary: Get all categories
      tags:
      - Categories
    post:
      consumes:
      - application/json
      description: Add a new category to the database
      parameters:
      - description: Category Info
        in: body
        name: category
        required: true
        schema:
          $ref: '#/definitions/model.Category'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/model.Category'
        "400":
